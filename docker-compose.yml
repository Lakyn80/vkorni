services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend_photos:/app/static/photos
      - backend_accepted_images:/app/static/accepted_images
      - backend_rejected_images:/app/static/rejected_images
      - backend_exported_profiles:/app/static/exported_profiles
      - backend_data:/app/app/data
      - backend_chroma:/app/chroma_data
    ports:
      - "8020:8000"
    depends_on:
      - redis
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: rq worker bios images --url ${REDIS_URL}
    volumes:
      - backend_photos:/app/static/photos
      - backend_accepted_images:/app/static/accepted_images
      - backend_rejected_images:/app/static/rejected_images
      - backend_exported_profiles:/app/static/exported_profiles
      - backend_data:/app/app/data
      - backend_chroma:/app/chroma_data
    depends_on:
      - redis
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE}
    ports:
      - "3014:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vkorni-redis
    ports:
      - "6383:6379"
    restart: unless-stopped

volumes:
  backend_photos:
  backend_accepted_images:
  backend_rejected_images:
  backend_exported_profiles:
  backend_data:
  backend_chroma:
