services:
  backend:
    image: ghcr.io/lakyn80/vkorni-backend:latest
    volumes:
      - /opt/vkorni/static/photos:/app/static/photos
      - /opt/vkorni/static/accepted_images:/app/static/accepted_images
      - /opt/vkorni/static/rejected_images:/app/static/rejected_images
      - /opt/vkorni/static/exported_profiles:/app/static/exported_profiles
      - /opt/vkorni/data:/app/app/data
      - backend_chroma:/app/chroma_data
    ports:
      - "8020:8000"
    depends_on:
      - redis
    env_file:
      - .env
    restart: unless-stopped

  worker:
    image: ghcr.io/lakyn80/vkorni-backend:latest
    command: rq worker --with-scheduler --url ${REDIS_URL} bios images
    volumes:
      - /opt/vkorni/static/photos:/app/static/photos
      - /opt/vkorni/static/accepted_images:/app/static/accepted_images
      - /opt/vkorni/static/rejected_images:/app/static/rejected_images
      - /opt/vkorni/static/exported_profiles:/app/static/exported_profiles
      - /opt/vkorni/data:/app/app/data
      - backend_chroma:/app/chroma_data
    depends_on:
      - redis
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: ghcr.io/lakyn80/vkorni-frontend:latest
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "3014:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vkorni-redis
    ports:
      - "6382:6379"
    restart: unless-stopped

volumes:
  backend_chroma:
